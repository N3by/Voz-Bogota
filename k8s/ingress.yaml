apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voz-ingress
  namespace: voz-bogota
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
